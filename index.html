<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGS Family Vault</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="icon" href="./icon-512.png" type="image/png">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>

  <style>
    :root { 
        --primary: #2c3e50; 
        --accent: #3498db; 
        --bg: #f0f2f5; 
        --success: #27ae60;
        --warning: #e67e22;
        --danger: #e74c3c;
    }
    
    /* 1. Reset and Centering Logic */
    body { 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        background: var(--bg);
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    /* 2. Main Content Container */
    #main-content { 
        display: none; 
        width: 100%;
        max-width: 500px; 
        padding: 15px;
        box-sizing: border-box;
    }

    body.authorized #main-content { 
        display: block; 
    }
    
    /* 3. Gatekeeper (Full Screen Overlay) */
    #gatekeeper-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--primary); color: white; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999;
        padding: 20px;
        box-sizing: border-box;
    }

    /* 4. The Vault Card */
    .container { 
        background: white; 
        padding: 2rem; 
        border-radius: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        width: 100%;
        box-sizing: border-box;
        margin-top: 20px;
        min-height: auto;
    }

    h2 { text-align: center; color: var(--primary); margin-top: 0; font-weight: 700; }

    /* 5. Responsive Form Elements */
    input, textarea, button { 
        width: 100%; 
        padding: 14px; 
        margin: 10px 0; 
        border-radius: 12px; 
        border: 1px solid #dcdde1; 
        box-sizing: border-box; 
        font-size: 16px; 
    }

    button { 
        background: var(--accent); 
        color: white; 
        border: none; 
        cursor: pointer; 
        font-weight: 600; 
        transition: transform 0.1s, background 0.2s; 
    }

    button:hover { background: #2980b9; }
    button:active { transform: scale(0.97); }

    .secondary-btn { background: #ecf0f1; color: var(--primary); margin-top: 10px; }

    /* 6. Vault Entry Cards */
    .entry-card { 
        background: #fff; 
        border: 1px solid #edf2f7; 
        padding: 16px; 
        margin-bottom: 12px; 
        border-radius: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .entry-title { font-weight: bold; font-size: 1.1rem; color: var(--accent); }
    
    .copy-group {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
    }

    .copy-btn { 
        width: auto; 
        margin: 0; 
        padding: 8px 15px; 
        font-size: 0.85rem; 
        flex-grow: 1;
    }

    .hidden { display: none !important; }

    .section-title { 
        font-size: 0.8rem; 
        text-transform: uppercase; 
        color: #95a5a6; 
        margin: 25px 0 10px; 
        font-weight: bold; 
        letter-spacing: 1px;
    }

    #search-bar { 
        border: 2px solid var(--accent); 
        margin-bottom: 20px; 
        background: #fff;
    }

    /* 7. Mobile Specific Tweaks */
    @media (max-width: 480px) {
        .container { 
            padding: 1.2rem; 
            border-radius: 15px; 
            margin-top: 10px;
        }
        h2 { font-size: 1.4rem; }
    }
</style>
</head>
<body>

<div id="gatekeeper-screen">
    <img src="./icon-192.png" width="80" style="margin-bottom:20px; border-radius: 15px;">
    <h2 style="color: white;">MGS SYSTEM ACCESS</h2>
    <div style="width: 80%; max-width: 300px;">
        <input type="password" id="gatekeeper-input" placeholder="Enter System Code" style="text-align:center;">
        <button onclick="checkAccess()" style="background:#3498db;">Initialize Boot</button>
    </div>
</div>

<div id="main-content">
    <div class="container">
        <div id="login-screen">
            <h2>🔐 MGS Family Vault</h2>
            <p style="text-align: center; color: #7f8c8d;">Enter your Secure PIN</p>
            <input type="password" id="pin-input" placeholder="4-6 Digit PIN" inputmode="numeric">
            <button onclick="handleLogin()">Unlock My Vault</button>
            <div style="margin-top: 25px; text-align: center; border-top: 1px solid #eee; padding-top: 15px;">
                <a href="#" onclick="emergencyExport()" style="color: var(--danger); font-size: 0.9rem; text-decoration: none; font-weight: bold;">🆘 Emergency Support Recovery</a>
                <br><br>
                <a href="./Guide.html" style="color: #3498db; font-size: 0.8rem;">View User Guide</a>
            </div>
        </div>

        <div id="vault-screen" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin:0;">Your Vault</h2>
                <button onclick="toggleAddForm()" style="width: auto; padding: 5px 15px;" id="toggle-btn">+ New</button>
            </div>
            
            <div id="add-form" class="hidden" style="background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px dashed #ccc; margin-top:15px;">
                <input type="hidden" id="edit-id" value="">
                
                <input type="text" id="site-name" placeholder="Site Name">
                <input type="text" id="site-user" placeholder="Username/Email">
                <div style="display: flex; gap: 8px;">    
                    <input type="text" id="site-pass" placeholder="Password">
                    <button onclick="generatePass()" style="width: auto; background: var(--primary);">🎲</button>
                </div>
                <textarea id="site-notes" placeholder="Notes..."></textarea>
                <button id="save-btn" onclick="saveEntry()" style="background: var(--success);">Save to Vault</button>
            </div>

            <input type="text" id="search-bar" placeholder="🔍 Search..." onkeyup="filterEntries()">
            
            <div id="welcome-guide" class="hidden" style="background: #e3f2fd; padding: 20px; border-radius: 12px; text-align: center;">
                <h3>👋 Welcome!</h3>
                <p>Save your first password to initialize recovery.</p>
                <button onclick="toggleAddForm()" style="background: #1976d2;">Add First Password</button>
            </div>

            <div id="entries-list"></div>

            <div class="section-title">Maintenance</div>
            <button class="secondary-btn" onclick="exportBackup()">📥 Save Local Backup (.json)</button>
            <label class="secondary-btn" style="display: block; text-align: center; cursor: pointer; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                📤 Restore from Backup
                <input type="file" id="import-file" class="hidden" onchange="importBackup(event)">
            </label>
            <button class="secondary-btn" style="background: var(--danger); color: white;" onclick="exportRecovery()">🆘 Get Recovery File (.vault)</button>
            <button class="secondary-btn" onclick="location.reload()">🔒 Lock Vault</button>
            
            <div style="text-align: center; font-size: 0.7rem; color: #bdc3c7; margin-top: 20px;">
                v2.2 | MGS Secure Environment
            </div>
        </div>
    </div>
</div>

<script>
    // --- GATEKEEPER LOGIC ---
async function checkAccess() {
    const SECRET_HASH = "ae3683e1b8152065cca4b0268a3af5b011a995477dc19c3ddbf0cb7767f14808";
    const SALT = "MGS_Guardian_Shield_2026";
    const inputField = document.getElementById('gatekeeper-input');
    const input = inputField.value.trim(); 
    if (!input) return;
    const saltedInput = input + SALT;
    const msgUint8 = new TextEncoder().encode(saltedInput);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    if (hashHex === SECRET_HASH) {
        sessionStorage.setItem("mgs_unlocked", "true");
        unlockUI();
    } else {
        alert("Invalid Access Code. System remains locked.");
        inputField.value = "";
    }
}

    function unlockUI() {
        document.getElementById('gatekeeper-screen').style.display = 'none';
        document.body.classList.add('authorized');
    }

    window.onload = () => {
        if (sessionStorage.getItem("mgs_unlocked") === "true") {
            unlockUI();
        }
    };

    // --- VAULT CORE LOGIC ---
    const ADMIN_PUBLIC_KEY_JWK = {"alg":"RSA-OAEP-256","e":"AQAB","ext":true,"key_ops":["encrypt"],"kty":"RSA","n":"yQIEFGQxs9tWAYTORHYAaW5QH7cCmuxptLaOKv2ZDlhuUTdppR0DZ0tZwrD-VvnHgEDLTy7W6uaCJq-B-qmrDNIxFXl8rmUr0QYtexUVwVk_NWfjv1aG7oBeFrhz73kD4Jotljv7iX8ELRFSIfSFQV9RGeyI2I6tCM-xTirxULkHwzLcO8aKC8bC7BwD9A9Z05Koh0ztpg7CDWxDGdnSTu_WhiYp5ZoloS1ttd3gOwwrnJIU_RAgyqwkzP-aLhPzgqCeOWrEhygPfk-hWd9yBsjRELGhLyQ2WYS0Hy-f3917WQhq8I95q3DUxkkWlek_vOfLBC1_3xsF3TZHO4P5ww"};
    let db, encryptionKey;

    const request = indexedDB.open("FamilyVaultDB", 3);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("vault")) db.createObjectStore("vault", { keyPath: "id", autoIncrement: true });
        if (!db.objectStoreNames.contains("settings")) db.createObjectStore("settings", { keyPath: "key" });
    };
    request.onsuccess = (e) => { db = e.target.result; };

    async function deriveKey(pin) {
        const encoder = new TextEncoder();
        const baseKey = await crypto.subtle.importKey("raw", encoder.encode(pin), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: encoder.encode("family-constant-salt"), iterations: 100000, hash: "SHA-256" },
            baseKey, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
        );
    }

    async function handleLogin() {
        const pin = document.getElementById('pin-input').value;
        if(pin.length < 4) return alert("PIN too short.");
        try {
            encryptionKey = await deriveKey(pin);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('vault-screen').classList.remove('hidden');
            renderEntries();
        } catch(e) { alert("Login failed."); }
    }

    async function saveEntry() {
        const id = document.getElementById('edit-id').value;
        const site = document.getElementById('site-name').value.trim();
        const user = document.getElementById('site-user').value.trim();
        const pass = document.getElementById('site-pass').value.trim();
        const notes = document.getElementById('site-notes').value.trim();
        if(!site || !pass) return alert("Required fields missing.");

        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, encryptionKey, new TextEncoder().encode(JSON.stringify({ site, user, pass, notes })));

        const tx = db.transaction("vault", "readwrite");
        const store = tx.objectStore("vault");
        
        const entry = { iv, content: encrypted };
        if (id) entry.id = Number(id); // Keep the same ID to update instead of add

        store.put(entry);
        tx.oncomplete = () => { 
            renderEntries(); 
            clearInputs(); 
            if (!document.getElementById('add-form').classList.contains('hidden')) toggleAddForm();
            updateRecoveryEnvelope(); 
        };
    }

    async function renderEntries() {
        const list = document.getElementById('entries-list');
        const welcome = document.getElementById('welcome-guide');
        list.innerHTML = "";
        let count = 0;

        const tx = db.transaction("vault", "readonly");
        tx.objectStore("vault").openCursor().onsuccess = async e => {
            const cursor = e.target.result;
            if (cursor) {
                count++;
                try {
                    const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: cursor.value.iv }, encryptionKey, cursor.value.content);
                    const item = JSON.parse(new TextDecoder().decode(dec));
                    const div = document.createElement('div');
                    div.className = 'entry-card';
                    div.innerHTML = `
                        <div class="entry-title">${item.site}</div>
                        <div style="font-size:0.8rem; color:grey;">${item.user}</div>
                        ${item.notes ? `<div style="font-size:0.75rem; color:#7f8c8d; margin-top:5px; font-style:italic;">Note: ${item.notes}</div>` : ''}
                        <div class="copy-group">
                            <button class="copy-btn" onclick="copyText('${item.pass}')">Copy</button>
                            <button class="copy-btn" style="background:var(--primary);" onclick="editEntry(${cursor.value.id})">Edit</button>
                            <button class="copy-btn" style="background:#95a5a6;" onclick="deleteEntry(${cursor.value.id})">Del</button>
                        </div>`;
                    list.appendChild(div);
                } catch(err) { console.error("Decryption failed."); }
                cursor.continue();
            } else {
                welcome.style.display = count === 0 ? "block" : "none";
            }
        };
    }

    async function editEntry(id) {
        const tx = db.transaction("vault", "readonly");
        const request = tx.objectStore("vault").get(id);
        request.onsuccess = async () => {
            const data = request.result;
            const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: data.iv }, encryptionKey, data.content);
            const item = JSON.parse(new TextDecoder().decode(dec));
            
            document.getElementById('edit-id').value = id;
            document.getElementById('site-name').value = item.site;
            document.getElementById('site-user').value = item.user;
            document.getElementById('site-pass').value = item.pass;
            document.getElementById('site-notes').value = item.notes || "";
            
            document.getElementById('save-btn').innerText = "Update Entry";
            document.getElementById('save-btn').style.background = "var(--warning)";
            
            if (document.getElementById('add-form').classList.contains('hidden')) toggleAddForm();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    }

    async function updateRecoveryEnvelope() {
        if (!encryptionKey || !ADMIN_PUBLIC_KEY_JWK.kty) return;
        try {
            const rawKey = await crypto.subtle.exportKey("raw", encryptionKey);
            const hash = await crypto.subtle.digest("SHA-256", rawKey);
            const keyID = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 8);
            const adminPubKey = await crypto.subtle.importKey("jwk", ADMIN_PUBLIC_KEY_JWK, { name: "RSA-OAEP", hash: "SHA-256" }, false, ["encrypt"]);
            const wrapped = await crypto.subtle.encrypt({ name: "RSA-OAEP" }, adminPubKey, rawKey);
            const tx = db.transaction("settings", "readwrite");
            tx.objectStore("settings").put({ key: `recovery_envelope_${keyID}`, value: Array.from(new Uint8Array(wrapped)) });
        } catch (e) { console.error("Recovery Setup Failed", e); }
    }

    async function exportRecovery() {
        if (!encryptionKey) return;
        const rawKey = await crypto.subtle.exportKey("raw", encryptionKey);
        const hash = await crypto.subtle.digest("SHA-256", rawKey);
        const keyID = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 8);
        const tx = db.transaction(["vault", "settings"], "readonly");
        const entries = [];
        tx.objectStore("vault").openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                entries.push({ iv: Array.from(cursor.value.iv), content: Array.from(new Uint8Array(cursor.value.content)) });
                cursor.continue();
            } else {
                tx.objectStore("settings").get(`recovery_envelope_${keyID}`).onsuccess = (ev) => {
                    if (!ev.target.result) return alert("Save a password first!");
                    const pack = { type: "MASTER_RECOVERY_FINAL", envelope: ev.target.result.value, data: entries };
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([JSON.stringify(pack)], {type: "application/octet-stream"}));
                    a.download = `RECOVERY_${keyID}.vault`;
                    a.click();
                };
            }
        };
    }

    async function emergencyExport() {
        const tx = db.transaction(["vault", "settings"], "readonly");
        const entries = [], envelopes = [];
        tx.objectStore("vault").openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                entries.push({ iv: Array.from(cursor.value.iv), content: Array.from(new Uint8Array(cursor.value.content)) });
                cursor.continue();
            } else {
                tx.objectStore("settings").openCursor().onsuccess = (ev) => {
                    const c = ev.target.result;
                    if (c) {
                        if (c.value.key.startsWith("recovery_envelope")) envelopes.push(c.value.value);
                        c.continue();
                    } else {
                        const pack = { type: "MASTER_RECOVERY_MULTI", envelopes, data: entries };
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(new Blob([JSON.stringify(pack)], {type: "application/octet-stream"}));
                        a.download = `EMERGENCY_RECOVERY.vault`;
                        a.click();
                        alert("File created! Send this to your admin.");
                    }
                };
            }
        };
    }

    function toggleAddForm() { 
        const f = document.getElementById('add-form');
        f.classList.toggle('hidden');
        const isHidden = f.classList.contains('hidden');
        document.getElementById('toggle-btn').innerText = isHidden ? "+ New" : "Close";
        if (isHidden) clearInputs();
    }
    
    function generatePass() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        const vals = new Uint32Array(16);
        crypto.getRandomValues(vals);
        document.getElementById('site-pass').value = Array.from(vals).map(v => chars[v % chars.length]).join('');
    }
    
    function copyText(t) { navigator.clipboard.writeText(t); alert("Copied!"); }
    
    async function deleteEntry(id) { 
        if(confirm("Delete?")) { 
            const tx = db.transaction("vault", "readwrite"); 
            tx.objectStore("vault").delete(id); 
            tx.oncomplete = () => renderEntries(); 
        } 
    }
    
    function clearInputs() { 
        ['edit-id', 'site-name', 'site-user', 'site-pass', 'site-notes'].forEach(id => document.getElementById(id).value = ""); 
        document.getElementById('save-btn').innerText = "Save to Vault";
        document.getElementById('save-btn').style.background = "var(--success)";
    }
    
    function filterEntries() {
        const q = document.getElementById('search-bar').value.toLowerCase();
        Array.from(document.getElementsByClassName('entry-card')).forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }
    
    async function exportBackup() {
        const tx = db.transaction("vault", "readonly");
        const entries = [];
        tx.objectStore("vault").openCursor().onsuccess = (e) => {
            const c = e.target.result;
            if (c) { entries.push({ iv: Array.from(c.value.iv), content: Array.from(new Uint8Array(c.value.content)) }); c.continue(); }
            else { 
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(entries)], {type: "application/json"}));
                a.download = `Vault_Backup.json`;
                a.click();
            }
        };
    }
    
    async function importBackup(ev) {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = JSON.parse(e.target.result);
            const tx = db.transaction("vault", "readwrite");
            const store = tx.objectStore("vault");
            store.clear();
            data.forEach(item => store.add({ iv: new Uint8Array(item.iv), content: new Uint8Array(item.content).buffer }));
            tx.oncomplete = () => { alert("Restored!"); location.reload(); };
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
